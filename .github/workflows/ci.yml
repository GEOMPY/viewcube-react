name: CI

on:
  push:
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck:all

      - name: Test
        run: npm run test

      - name: Smoke sample integration
        run: npm run smoke:sample

      - name: README checks
        run: npm run check:readme

      - name: Release prepublish checks
        if: matrix.node-version == '22.x'
        run: npm run phase11:check
